<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arcade Hub</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Arcade Hub</h1>
    <p>Play embeddable games from OnlineGames.io</p>
  </header>

  <main class="games-grid">
    <section class="game-card">
      <h2>Highway Traffic</h2>
      <iframe src="https://www.onlinegames.io/games/2022/unity/highway-traffic/index.html" title="Highway Traffic" loading="lazy" allowfullscreen></iframe>
    </section>

    <section class="game-card">
      <h2>Smash Karts</h2>
      <iframe src="https://www.onlinegames.io/games/2023/unity/smash-karts/index.html" title="Smash Karts" loading="lazy" allowfullscreen></iframe>
    </section>

    <section class="game-card">
      <h2>Drift Hunters</h2>
      <iframe src="https://www.onlinegames.io/games/2022/unity/drift-hunters/index.html" title="Drift Hunters" loading="lazy" allowfullscreen></iframe>
    </section>

    <section class="game-card">
      <h2>Traffic Jam 3D</h2>
      <iframe src="https://www.onlinegames.io/games/2022/unity/traffic-jam-3d/index.html" title="Traffic Jam 3D" loading="lazy" allowfullscreen></iframe>
    </section>

    <section class="game-card">
      <h2>Madalin Stunt Cars 2</h2>
      <iframe src="https://www.onlinegames.io/games/2021/unity/madalin-stunt-cars-2/index.html" title="Madalin Stunt Cars 2" loading="lazy" allowfullscreen></iframe>
    </section>

    <section class="game-card">
      <h2>Moto X3M</h2>
      <iframe src="https://www.onlinegames.io/games/2021/html5/moto-x3m/index.html" title="Moto X3M" loading="lazy" allowfullscreen></iframe>
    </section>
  </main>
</body>
</html>
